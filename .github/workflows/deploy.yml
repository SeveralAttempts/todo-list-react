name: Deploy React App

on:
    push:
        branches:
            -main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Build Docker image
        run: docker build -t my-react-app .

      - name: Stop old container
        run: docker rm -f my-react-container || true

      - name: Run container
        run: docker run -d -p 80:80 --name my-react-container my-react-app